[pytest]
minversion = 7.0
addopts = -ra -q --strict-markers --strict-config --cov=worker_runtime --cov=gpu_memory_config --cov-report=term-missing:skip-covered
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    e2e: marks tests as end-to-end (slow) tests that require NATS server
    simple_e2e: marks tests as simple e2e tests using running NATS server
    unit: marks tests as fast unit tests with mocks
    integration: marks tests as integration tests
asyncio_mode = auto

# Logging configuration for tests
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S